version: "3.8"

# VCD 動作検証環境（Webhook直接トリガー版）
#
# アーキテクチャ:
#   trigger_alert.sh  ← 攻撃シナリオを模したアラートを手動送信
#      ↓ HTTP POST /webhook
#   vcd-sidecar ← ネットワーク断 → 証拠保全 → コンテナ削除
#      ↓ destroy
#   vuln-app-watchdog ← イメージから再生成（クリーンな状態に戻る）
#
# 使い方:
#   1. 起動:
#      docker compose -f docker-compose.test.yml up --build -d
#
#   2. VCD フローを手動トリガー（シナリオ番号を選択）:
#      ./tests/trigger_alert.sh 1   # Shell spawned（コマンドインジェクション）
#      ./tests/trigger_alert.sh 2   # Outbound connection（リバースシェル）
#      ./tests/trigger_alert.sh 3   # File written（Webshell設置）
#      ./tests/trigger_alert.sh 4   # Privilege escalation（特権昇格）
#
#   3. 確認:
#      docker ps -a | grep vuln-app          # コンテナが削除・再生成されるか
#      docker logs vcd-test-sidecar          # VCD フローのログ
#      ls ./forensics/                       # 証拠ファイルの保存を確認
#
# ⚠ このファイルは検証専用です。本番環境では使用しないでください。

services:

  # ────────────────────────────────
  # 1. 脆弱なPHPアプリ（攻撃対象）
  # ────────────────────────────────
  vuln-app:
    build: tests/vuln-app
    image: vcd-test-vuln-app:latest
    container_name: vcd-test-vuln-app
    restart: "no"                     # watchdog が再生成を担当
    ports:
      - "8080:80"                     # http://localhost:8080
    networks:
      - vcd-test-net

  # ────────────────────────────────
  # 2. VCD Sidecar — 検知→隔離→証拠保全→削除
  # ────────────────────────────────
  vcd-sidecar:
    build: .
    container_name: vcd-test-sidecar
    restart: always
    environment:
      - VCD_WEBHOOK_PORT=8888
      - VCD_FORENSICS_DIR=/var/vcd/forensics
      - VCD_MEMORY_DUMP=false
      - VCD_TERMINATE_MODE=graceful
      - VCD_TERMINATE_TIMEOUT=30
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./forensics:/var/vcd/forensics
    ports:
      - "8888:8888"
    cap_add:
      - NET_ADMIN
    networks:
      - vcd-test-net

  # ────────────────────────────────
  # 3. Watchdog — コンテナ再生成
  # ────────────────────────────────
  vuln-app-watchdog:
    image: docker:27-cli
    container_name: vcd-test-watchdog
    restart: always
    depends_on:
      - vuln-app
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./tests/vuln-app-watchdog.sh:/watchdog.sh:ro
    command: sh /watchdog.sh
    networks:
      - vcd-test-net

networks:
  vcd-test-net:
    name: vcd-test-net
    driver: bridge
