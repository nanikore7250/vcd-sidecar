# Webサーバープロセスを起点に絞り込む（インフラコンテナの誤検知を防ぐ）
#
# container.name によるフィルタはコンテナメタデータ解決の遅延があるため使用しない。
# 代わりに proc.pname（親プロセス名）で「Webサーバーが子として起動した」ことを検知する。
# これにより Apache/PHP の通常起動と攻撃を正確に区別できる。

# 検証対象の Web サーバープロセス（PHP/Apache の各種バイナリ名を列挙）
# デバッグ用: コンテナ内の全 execve をキャプチャ（親プロセス問わず）
# Falco が kmod 経由でコンテナ syscall を取れているか確認するためのルール
# 確認後は削除すること
- rule: VCD - DEBUG ALL execve
  desc: debug - container フィルタなし・全 execve
  condition: evt.type = execve
  output: "ALL execve (container=%container.name cid=%container.id proc=%proc.name parent=%proc.pname)"
  priority: WARNING
  tags: [vcd, debug]

- macro: webserver_parent
  condition: >
    proc.pname in (apache2, httpd, nginx, php, php-fpm, php-fpm8.2, php-fpm8.1,
                   php-fpm8.0, php-fpm7.4, php8.2, php8.1, php8.0, php7.4,
                   gunicorn, uvicorn, uwsgi)

- rule: VCD - Shell spawned in container
  desc: Webサーバープロセスがシェルを起動した（コマンドインジェクションの可能性）
  condition: >
    container
    and evt.type = execve
    and proc.name in (bash, sh, zsh, dash, ksh)
    and webserver_parent
  output: "Shell spawned in container (container=%container.name container_id=%container.id pid=%proc.pid user=%user.name cmdline=%proc.cmdline parent=%proc.pname)"
  priority: WARNING
  tags: [vcd, shell]

- rule: VCD - Outbound connection in container
  desc: Webサーバープロセスが外向き接続を試みた（リバースシェルの可能性）
  condition: >
    container
    and evt.type = connect
    and fd.typechar = 4
    and not fd.sip in (127.0.0.1)
    and webserver_parent
  output: "Outbound connection from container (container=%container.name container_id=%container.id proc=%proc.name pid=%proc.pid parent=%proc.pname dest=%fd.rip:%fd.rport)"
  priority: WARNING
  tags: [vcd, network]

- rule: VCD - Unexpected file written in container
  desc: Webサーバープロセスが /tmp にファイルを配置した（Webshell等の可能性）
  condition: >
    container
    and evt.type in (creat, open)
    and evt.is_open_write = true
    and fd.typechar = f
    and fd.name startswith /tmp
    and webserver_parent
  output: "Unexpected file written in container (container=%container.name container_id=%container.id proc=%proc.name pid=%proc.pid parent=%proc.pname file=%fd.name)"
  priority: WARNING
  tags: [vcd, file]

- rule: VCD - Privilege escalation attempt
  desc: 非rootプロセスが root への setuid/setgid を試みる（真の特権昇格のみ）
  # Apache の root→www-data 降格（正常動作）は除外される:
  #   その場合 user.uid=0 なので user.uid != 0 条件に引っかからない
  condition: >
    container
    and evt.type in (setuid, setgid)
    and user.uid != 0
    and evt.rawarg.uid = 0
  output: "Privilege escalation attempt (container=%container.name container_id=%container.id proc=%proc.name pid=%proc.pid user=%user.name target_uid=%evt.rawarg.uid)"
  priority: CRITICAL
  tags: [vcd, privilege]

- rule: VCD - Sensitive file read in container
  desc: Webサーバープロセスが機密ファイルを読み取った（情報窃取の可能性）
  condition: >
    container
    and evt.type = open
    and fd.name in (/etc/shadow, /etc/passwd, /etc/sudoers)
    and webserver_parent
  output: "Sensitive file read in container (container=%container.name container_id=%container.id proc=%proc.name pid=%proc.pid parent=%proc.pname file=%fd.name)"
  priority: WARNING
  tags: [vcd, file, sensitive]
