# Falco configuration — vcd-sidecar 連携用
#
# Falco が検知したアラートを Falcosidekick 経由で vcd-sidecar に転送する。
# このファイルは docker-compose.test.yml から /etc/falco/falco.yaml にマウントされる。

# ルールファイルの読み込み順序
rules_file:
  - /etc/falco/falco_rules.yaml         # Falco組み込みルール
  - /etc/falco/falco_rules.local.yaml   # ローカル上書き用（存在しなくてもよい）
  - /etc/falco/rules.d/                 # カスタムルール（vcd_rules.yaml はここ）

# JSON形式で出力する（Falcosidekick が解析するために必要）
json_output: true
json_include_output_property: true
json_include_tags_property: true

# Falcosidekick へ HTTP で転送する
http_output:
  enabled: true
  url: "http://falcosidekick:2801/"
  user_agent: "falcosecurity/falco"

# コンテナログが読みやすくなるように stdout への出力は無効化
stdout_output:
  enabled: false

# ログ設定
log_stderr: true
log_syslog: false
log_level: info

# container.id / container.name の解決は HOST_ROOT=/host 環境変数と
# /var/run/docker.sock:/host/var/run/docker.sock マウントで自動的に行われる
