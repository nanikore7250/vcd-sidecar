# Falco configuration — vcd-sidecar 連携用 (Falco 0.39+)
#
# Falco が検知したアラートを Falcosidekick 経由で vcd-sidecar に転送する。
# このファイルは docker-compose.test.yml から /etc/falco/falco.yaml にマウントされる。

# ドライバ設定（0.38 以降は engine セクションで指定する）
# カスタム falco.yaml でデフォルトを上書きするため、明示的に記載が必要
engine:
  kind: modern_ebpf
  modern_ebpf:
    cpus_for_each_buffer: 2
    buf_size_preset: 4
    drop_failed_exit: false

# ルールファイルの読み込み順序
# NOTICE: 0.38 以降は rules_file（単数）が廃止され rules_files（複数）が必須
rules_files:
  - /etc/falco/falco_rules.yaml         # Falco 組み込みルール
  - /etc/falco/falco_rules.local.yaml   # ローカル上書き用（存在しなくてもよい）
  - /etc/falco/rules.d/                 # カスタムルール（vcd_rules.yaml はここ）

# JSON 形式で出力する（Falcosidekick が解析するために必要）
json_output: true
json_include_output_property: true
json_include_tags_property: true

# Falcosidekick へ HTTP で転送する
http_output:
  enabled: true
  url: "http://falcosidekick:2801/"
  user_agent: "falcosecurity/falco"

# コンテナログが読みやすくなるように stdout への出力は無効化
stdout_output:
  enabled: false

# ログ設定
log_stderr: true
log_syslog: false
log_level: info
